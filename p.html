<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login ke CERIA NET</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            background-color: #263238;
            position: relative;
            overflow: hidden;
            border-radius: 36px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Simulasi Status Bar Atas */
        .status-bar {
            height: 44px;
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 14px;
        }

        /* Simulasi Header Browser */
        .browser-header {
            height: 56px;
            background-color: #212121;
            padding: 0 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            border-bottom: 1px solid #333;
        }
        .header-title-main { font-size: 20px; font-weight: bold; }
        .header-title-sub { font-size: 14px; color: #9e9e9e; }

        /* Area Konten Utama */
        .content-area {
            position: relative;
            height: calc(100% - 100px);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 50px;
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://w0.peakpx.com/wallpaper/701/198/HD-wallpaper-wukong-and-shura-for-character-pubg-mobile.jpg');
            background-size: cover;
            background-position: center bottom;
            filter: blur(2px) contrast(1.1);
            z-index: -1;
        }

        .login-card {
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px);
            width: 90%;
            max-width: 360px;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 10;
        }

        .logo-text {
            font-family: 'Times New Roman', Times, serif;
            font-size: 40px;
            color: #d32f2f;
            font-weight: bold;
            text-shadow: -2px -2px 0 #81d4fa, 2px -2px 0 #81d4fa, -2px 2px 0 #81d4fa, 2px 2px 0 #81d4fa;
            margin-bottom: 5px;
        }

        .company-name { font-size: 18px; color: #b71c1c; font-weight: bold; margin-bottom: 15px; }

        .tab-buttons { display: flex; justify-content: space-between; margin-bottom: 15px; gap: 10px; }
        .tab-btn { flex: 1; padding: 8px; border: none; border-radius: 5px; font-weight: bold; color: white; cursor: pointer; }
        .active-voucher { background-color: #b71c1c; color: yellow; }
        .inactive-member { background-color: #2e7d32; }

        .voucher-input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background-color: white;
            font-size: 18px;
            text-align: center;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #1976d2;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .paket-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 15px 0; }
        .paket-table th, .paket-table td { border: 1px solid #bdbdbd; padding: 6px; text-align: center; }

        .external-footer { position: absolute; bottom: 30px; width: 100%; text-align: center; color: #e0e0e0; font-size: 12px; }

        /* --- STYLE OVERLAY GAMBAR --- */
        #imageOverlay {
            display: none; /* Tersembunyi */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 36px; /* Sesuai bentuk HP */
        }

        #imageOverlay img {
            max-width: 85%;
            max-height: 70%;
            border: 3px solid white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .close-btn {
            margin-top: 20px;
            padding: 10px 30px;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div id="imageOverlay">
            <img src="pe.jpg" alt="Voucher Image">
            <button class="close-btn" onclick="toggleImage(false)">TUTUP</button>
        </div>

        <div class="status-bar">
            <span>09.55.07 👤</span>
            <span>📶 📡 🔋24%</span>
        </div>

        <div class="browser-header">
            <div>
                <div class="header-title-main">Login ke CERIA NET</div>
                <div class="header-title-sub">ceria.net</div>
            </div>
            <div style="font-size:24px;">⋮</div>
        </div>

        <div class="content-area">
            <div class="background-image"></div>
            
            <div class="login-card">
                <div class="logo-text">CERIA.NET</div>
                <div class="company-name">PT.CIPTA CERIA ABADI</div>
                
                <div class="tab-buttons">
                    <button class="tab-btn active-voucher">🎟️ Voucher</button>
                    <button class="tab-btn inactive-member">👤 Member</button>
                </div>
                
                <input type="text" class="voucher-input" placeholder="Kode Voucher">
                
                <button class="login-btn" onclick="toggleImage(true)">➡️ Login</button>
                
                <table class="paket-table">
                    <thead>
                        <tr><th>PAKET</th><th>AKTIF</th><th>HARGA</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>2 JAM</td><td>2 JAM</td><td>Rp. 1.000</td></tr>
                        <tr><td>5 JAM</td><td>5 JAM</td><td>Rp. 2.000</td></tr>
                        <tr><td>1 HARI</td><td>1 HARI</td><td>Rp. 5.000</td></tr>
                    </tbody>
                </table>
                
                <p style="font-size:13px;">CS: <b>087 871 924 356</b></p>
            </div>
        </div>

        <div class="external-footer">
            Copyright &copy; 2022 CERIA.NET<br>powered by mikhmon
        </div>
    </div>

    <script>
        function toggleImage(show) {
            const overlay = document.getElementById('imageOverlay');
            overlay.style.display = show ? 'flex' : 'none';
        }
    </script>

</body>
</html>
